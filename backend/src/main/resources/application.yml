spring:
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    timeout: 6000
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_db?serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 20
      min-idle: 10
      max-active: 100
mybatis-plus:
  type-aliases-package: com.whlg.hospital.entity,com.whlg.hospital.dto,com.whlg.hospital.vo	#指定别名实体类的包
  mapper-locations: classpath:mapper/*.xml  #指定Mapper映射文件的路径
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 指定日志
    map-underscore-to-camel-case: true    #开启驼峰命名